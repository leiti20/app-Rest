<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>SEPA26 - Transactions</title>
	<link rel="stylesheet" th:href="@{/css/ResumeStyle.css}">
</head>
<body>
    <a class="back" href="/">← Accueil</a>
    <h1> Liste des transactions SEPA</h1>
    <p class="subtitle">10 dernières transactions enregistrées</p>

    <table th:if="${!transactions.isEmpty()}">
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Référence</th>
            <th>Montant</th>
            <th>Actions</th>
        </tr>
        <tr th:each="t : ${transactions}" 
            th:data-href="@{'/sepa26/html/' + ${t.id}}" 
            class="clickable-row">
            <td><a th:href="@{'/sepa26/html/' + ${t.id}}" th:text="${t.id}" onclick="event.stopPropagation()"></a></td>
            <td class="date-cell" th:text="${t.createdAt.contains('T') ? t.createdAt.substring(0, 16).replace('T', ' ') : t.createdAt}"></td>
            <td><a th:href="@{'/sepa26/html/' + ${t.id}}" th:text="${t.pmtId}" class="ref-link" onclick="event.stopPropagation()"></a></td>
            <td class="amount-cell"><span class="amount-badge" th:text="${#numbers.formatDecimal(t.amount, 1, 2)} + ' ' + ${t.currency}"></span></td>
            <td onclick="event.stopPropagation()">
                <a th:href="@{'/sepa26/delete-html/' + ${t.id}}" 
                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette transaction ?')"
                   style="color: #dc3545; text-decoration: none; font-size: 13px; font-weight: 600;">Supprimer</a>
            </td>
        </tr>
    </table>
    <p class="empty" th:if="${transactions.isEmpty()}">Aucune transaction enregistrée.</p>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('.clickable-row');
            rows.forEach(row => {
                row.addEventListener('click', () => {
                    window.location.href = row.dataset.href;
                });
            });
        });
    </script>
</body>
</html>
